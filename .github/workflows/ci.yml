name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate locked source
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          version: "0.11.28"
      - name: Install locked environment
        run: uv sync --frozen
      - name: Install Chromium for browser acceptance
        run: uv run playwright install --with-deps chromium
      - name: Lint
        run: uv run ruff check .
      - name: Check formatting
        run: uv run ruff format --check .
      - name: Type check
        run: uv run mypy
      - name: Test
        run: uv run pytest -q
      - name: Build distributions
        run: uv build --no-sources
      - name: Smoke-test the isolated wheel
        shell: bash
        run: |
          wheel="$(find dist -maxdepth 1 -type f -name '*.whl' -print -quit)"
          test -n "$wheel"
          uv run --isolated --no-project --with "$wheel" signet --help
          root="$(mktemp -d)"
          chmod 700 "$root"
          uv run --isolated --no-project --with "$wheel" signet deployment init \
            --config "$root/disabled.json" --data-dir "$root/data" \
            --namespace profile:wheel-smoke >/dev/null
          uv run --isolated --no-project --with "$wheel" signet deployment validate \
            --config "$root/disabled.json" >/dev/null
          uv run --isolated --no-project --with "$wheel" \
            signet deployment token issue --config "$root/disabled.json" \
            --namespace profile:wheel-smoke | python -c \
            'import re,sys; assert re.fullmatch(r"sgt_[A-Za-z0-9_-]{16}\.[A-Za-z0-9_-]{43}\n", sys.stdin.read())'
          metadata="$(uv run --isolated --no-project --with "$wheel" \
            signet deployment token list --config "$root/disabled.json")"
          ! grep -Eq 'sgt_[A-Za-z0-9_-]{16}\.[A-Za-z0-9_-]{43}' <<<"$metadata"
          unset metadata
          rm -rf "$root"
      - name: Scan source
        run: uv run --with bandit==1.9.4 bandit -r src/signet -ll
      - name: Export runtime dependencies
        run: >-
          uv export --quiet --frozen --no-dev --no-emit-project
          --format requirements-txt --output-file /tmp/signet-requirements.txt
      - name: Audit runtime dependencies
        run: >-
          uv run --with pip-audit==2.10.1 pip-audit
          -r /tmp/signet-requirements.txt --strict
