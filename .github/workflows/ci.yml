name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate locked source
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          version: "0.11.28"
      - name: Install locked environment
        run: uv sync --frozen
      - name: Lint
        run: uv run ruff check .
      - name: Check formatting
        run: uv run ruff format --check .
      - name: Type check
        run: uv run mypy
      - name: Test
        run: uv run pytest -q
      - name: Scan source
        run: uv run --with bandit==1.9.4 bandit -r src/signet -ll
      - name: Export runtime dependencies
        run: >-
          uv export --quiet --frozen --no-dev --no-emit-project
          --format requirements-txt --output-file /tmp/signet-requirements.txt
      - name: Audit runtime dependencies
        run: >-
          uv run --with pip-audit==2.10.1 pip-audit
          -r /tmp/signet-requirements.txt --strict
