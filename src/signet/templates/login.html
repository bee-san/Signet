{% extends "base.html" %}
{% block content %}
<section class="login-shell" aria-labelledby="login-heading">
  <img class="login-mark" src="/static/icons/signet-1254.png" width="112" height="112" alt="">
  <h1 id="login-heading">Signet</h1>
  {% if not fake_only_ui %}
  <form class="login-form" data-passkey-login data-csrf="{{ login_csrf }}">
    <label for="passkey-user">Account</label>
    <input id="passkey-user" name="user_id" autocomplete="username webauthn" maxlength="256" required>
    <button class="button button-primary" type="submit">Use passkey</button>
  </form>
  {% endif %}
  <details class="fallback-login"{% if fake_only_ui %} open{% endif %}>
    <summary>{{ 'Fake demo credentials' if fake_only_ui else 'Password and authenticator' }}</summary>
    <form class="login-form" action="/login/password" method="post">
      <input type="hidden" name="csrf_token" value="{{ login_csrf }}">
      <label for="fallback-user">{{ 'Fake user' if fake_only_ui else 'Account' }}</label>
      <input id="fallback-user" name="user_id" autocomplete="{{ 'off' if fake_only_ui else 'username' }}" maxlength="256" required>
      <label for="password">{{ 'Fake password' if fake_only_ui else 'Password' }}</label>
      <input id="password" name="password" type="{{ 'text' if fake_only_ui else 'password' }}" autocomplete="{{ 'off' if fake_only_ui else 'current-password' }}" maxlength="1024" required>
      <label for="totp-proof">{{ 'Fake login proof' if fake_only_ui else 'Authenticator code' }}</label>
      <input id="totp-proof" name="totp_proof" inputmode="{{ 'text' if fake_only_ui else 'numeric' }}" autocomplete="{{ 'off' if fake_only_ui else 'one-time-code' }}" maxlength="128" required>
      <button class="button button-primary" type="submit">{{ 'Enter fake demo' if fake_only_ui else 'Sign in' }}</button>
    </form>
  </details>
</section>
{% endblock %}
